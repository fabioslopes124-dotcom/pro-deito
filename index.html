<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelada Pro - Fila por Times</title>
    <style>
        :root { --bg: #0a0f1d; --primary: #00ff88; --blue: #3b82f6; --red: #ef4444; --orange: #f59e0b; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .tabs { display: flex; width: 100%; max-width: 500px; background: #1e293b; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; opacity: 0.5; }
        .tab.active { border-bottom: 3px solid var(--primary); opacity: 1; color: var(--primary); }
        .btn-undo { background: #334155; color: white; border: none; padding: 0 15px; cursor: pointer; }
        
        .container { width: 100%; max-width: 500px; padding: 12px; box-sizing: border-box; }
        .page { display: none; }
        
        .config-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .config-item { background: #161e2d; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .config-item small { display: block; font-size: 0.6rem; color: #94a3b8; }
        .btn-adj { background: #334155; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        .panel { background: #000; border-radius: 15px; padding: 10px; border: 1px solid #334155; text-align: center; margin-bottom: 10px; }
        .timer { font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; font-family: monospace; color: var(--primary); }
        
        .team-score { font-size: 2.2rem; font-weight: 900; display: block; }
        .score-blue { color: var(--blue); }
        .score-red { color: var(--red); }

        .grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; }
        .pos-num { font-size: 0.8rem; color: #475569; font-weight: bold; min-width: 15px; }

        .player-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .player-card { flex: 1; padding: 12px 4px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; overflow: hidden; min-height: 22px; }
        
        .card-blue { background: var(--blue); border-bottom: 4px solid #1e40af; }
        .card-red { background: var(--red); border-bottom: 4px solid #991b1b; }
        .card-empty { background: #1a1a1a; color: #444; border: 1px dashed #444; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-s { grid-column: span 2; background: #fff; color: #000; font-size: 1rem; margin-bottom: 5px; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-d { background: #1e293b; color: var(--orange); border: 1px solid var(--orange); }
        
        /* ESTILO DA FILA DIVIDIDA POR TIMES */
        .wait-section { margin-top: 25px; }
        .time-group { background: #161e2d; border-radius: 8px; padding: 10px; margin-bottom: 12px; border-left: 5px solid var(--primary); }
        .time-title { color: var(--primary); font-size: 0.75rem; font-weight: 900; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .wait-item { padding: 6px 0; border-bottom: 1px solid #2d3748; font-size: 0.95rem; font-weight: bold; display: flex; align-items: center; }
        .wait-item:last-child { border-bottom: none; }
        .wait-idx { color: #4a5568; font-size: 0.7rem; margin-right: 10px; width: 15px; }

        .btn-clear { background: var(--red); color: white; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="btn-undo" onclick="undo()">↩</button>
    <div class="tab active" onclick="setP('j',this)">QUADRA</div>
    <div class="tab" onclick="setP('l',this)">JOGADORES</div>
</div>

<div class="container">
    <div id="j" class="page" style="display:block">
        <div class="config-bar">
            <div class="config-item">
                <small>JOGADORES / TIME</small>
                <button class="btn-adj" onclick="adjS(-1)">-</button>
                <span id="valS" style="font-weight:bold; margin: 0 10px;">5</span>
                <button class="btn-adj" onclick="adjS(1)">+</button>
            </div>
            <div class="config-item">
                <small>MINUTOS</small>
                <button class="btn-adj" onclick="adjT(-1)">-</button>
                <span id="valT" style="font-weight:bold; margin: 0 10px;">10</span>
                <button class="btn-adj" onclick="adjT(1)">+</button>
            </div>
        </div>

        <div class="panel">
            <div class="timer" id="clock">10:00</div>
            <div class="grid">
                <div>
                    <span class="team-score score-blue" id="vA">0</span>
                    <small style="font-size:0.6rem; font-weight:bold">TIME AZUL</small>
                    <div id="lA" style="margin-top:10px"></div>
                </div>
                <div style="align-self:center; padding-top: 35px; color:#334155; font-weight:900;">X</div>
                <div>
                    <span class="team-score score-red" id="vR">0</span>
                    <small style="font-size:0.6rem; font-weight:bold">TIME VERMELHO</small>
                    <div id="lR" style="margin-top:10px"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-s" onclick="tk()">INICIAR PARTIDA</button>
            <button class="btn btn-a" onclick="rs('aG')">AZUL GANHOU (FICA)</button>
            <button class="btn btn-r" onclick="rs('rG')">VERMELHO GANHOU (FICA)</button>
            <button class="btn btn-d" onclick="rs('ea')">EMPATE (AZUL SAI 1º)</button>
            <button class="btn btn-d" onclick="rs('er')">EMPATE (VERM SAI 1º)</button>
        </div>
        
        <div id="waitArea" class="wait-section"></div>
    </div>

    <div id="l" class="page" style="display:none">
        <div style="display:flex;gap:8px;margin-bottom:15px">
            <input type="text" id="iN" placeholder="Nome do Jogador" style="flex:1;padding:15px;border-radius:8px;border:none;background:#1e293b;color:#fff;font-size:1.1rem">
            <button onclick="ad()" style="padding:15px;background:var(--primary);border:none;border-radius:8px;font-weight:700">ADD</button>
        </div>
        <div id="fL"></div>
        <button class="btn-clear" onclick="clearAll()">⚠️ LIMPAR TUDO</button>
    </div>
</div>

<script>
    let masterList = []; 
    let vitAzul = 0, vitVerm = 0;
    let history = []; let tMin = 10; let s = 600; let t = null; let sz = 5;

    function saveHistory(){
        history.push(JSON.stringify({masterList, vitAzul, vitVerm}));
        if(history.length > 30) history.shift();
    }

    function undo(){
        if(history.length > 0){
            let d = JSON.parse(history.pop());
            masterList = d.masterList; vitAzul = d.vitAzul; vitVerm = d.vitVerm;
            rn();
        }
    }

    function adjS(v){ sz = Math.max(1, sz+v); rn(); }
    function adjT(v){ tMin = Math.max(1, tMin+v); s = tMin*60; document.getElementById('valT').innerText=tMin; rn(); }

    function setP(id,el){
        document.getElementById('j').style.display=(id=='j'?'block':'none');
        document.getElementById('l').style.display=(id=='l'?'block':'none');
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        el.classList.add('active');
    }

    function ad(){
        let i = document.getElementById('iN');
        if(i.value){
            saveHistory();
            masterList.push({n: i.value.trim().toUpperCase(), v: 0});
            i.value = ''; rn();
        }
    }

    function clearAll(){
        if(confirm("Zerar tudo?")){ saveHistory(); masterList=[]; vitAzul=0; vitVerm=0; s=tMin*60; rn(); }
    }

    function rs(m){
        if(masterList.length < sz*2) return alert("Jogadores insuficientes!");
        saveHistory();
        
        let azul = [], vermelho = [], resto = masterList.slice(sz*2);
        for(let i=0; i<sz*2; i++){
            if(i%2==0) azul.push(masterList[i]); else vermelho.push(masterList[i]);
        }

        if(m == 'aG'){
            vitAzul++; azul.forEach(j=>j.v++); vermelho.forEach(j=>j.v=0);
            let novaLista = [];
            for(let i=0; i<sz; i++) { novaLista.push(azul[i]); novaLista.push(resto[i] || {n:''}); }
            masterList = [...novaLista, ...resto.slice(sz), ...vermelho];
        } else if(m == 'rG'){
            vitVerm++; vermelho.forEach(j=>j.v++); azul.forEach(j=>j.v=0);
            let novaLista = [];
            for(let i=0; i<sz; i++) { novaLista.push(resto[i] || {n:''}); novaLista.push(vermelho[i]); }
            masterList = [...novaLista, ...resto.slice(sz), ...azul];
        } else {
            masterList.forEach(j=>j.v=0);
            let t1 = (m == 'ea') ? azul : vermelho;
            let t2 = (m == 'ea') ? vermelho : azul;
            masterList = [...resto, ...t1, ...t2];
        }
        s = tMin * 60; clearInterval(t); t = null; rn();
    }

    function rn(){
        const lA=document.getElementById('lA'), lR=document.getElementById('lR'), fL=document.getElementById('fL'), waitArea=document.getElementById('waitArea');
        document.getElementById('vA').innerText = vitAzul;
        document.getElementById('vR').innerText = vitVerm;
        document.getElementById('valS').innerText = sz;
        lA.innerHTML = lR.innerHTML = fL.innerHTML = waitArea.innerHTML = '';

        // QUADRA COM MESCLAGEM 1x1
        for(let i=0; i<sz; i++){
            let jA = masterList[i*2];
            lA.innerHTML += `<div class="player-row"><span class="pos-num">${i+1}</span><div class="player-card ${jA && jA.n ?'card-blue':'card-empty'}">${jA?jA.n:''}</div></div>`;
            
            let jR = masterList[i*2 + 1];
            lR.innerHTML += `<div class="player-row"><div class="player-card ${jR && jR.n ?'card-red':'card-empty'}">${jR?jR.n:''}</div><span class="pos-num">${i+1}</span></div>`;
        }

        // FILA DE ESPERA DIVIDIDA POR TIMES (Vertical)
        let fila = masterList.slice(sz*2).filter(j => j.n);
        if(fila.length > 0){
            let numTimes = Math.ceil(fila.length / sz);
            for(let t=0; t < numTimes; t++){
                let sliceTime = fila.slice(t * sz, (t + 1) * sz);
                let divTime = document.createElement('div');
                divTime.className = 'time-group';
                divTime.innerHTML = `<span class="time-title">Time ${t + 1} na Espera</span>`;
                
                sliceTime.forEach((player, idx) => {
                    divTime.innerHTML += `<div class="wait-item"><span class="wait-idx">${idx+1}</span> ${player.n}</div>`;
                });
                waitArea.appendChild(divTime);
            }
        }

        // LISTA DE GERENCIAMENTO (ABA 2)
        masterList.forEach((j, i) => {
            if(j.n) fL.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:#161e2d; margin-bottom:5px; border-radius:8px;"><span>${i+1}. ${j.n}</span><button onclick="removeIdx(${i})" style="color:var(--red); background:none; border:none; font-weight:bold;">X</button></div>`;
        });

        let min=Math.floor(s/60), sec=s%60;
        document.getElementById('clock').innerText=`${min}:${sec<10?'0'+sec:sec}`;
    }

    function removeIdx(idx){
        saveHistory(); masterList.splice(idx, 1); rn();
    }

    function tk(){
        if(masterList.length < sz*2) return alert("Adicione jogadores!");
        if(t){ clearInterval(t); t=null; } 
        else { t = setInterval(() => { if(s>0){ s--; rn(); } else { clearInterval(t); t=null; alert("PARTIDA ENCERRADA!"); } }, 1000); }
    }
    rn();
</script>
</body>
</html>
